name: Generate Kanpo RSS Feed

on:
  schedule:
    # 09:00 JST (00:00 UTC) on weekdays
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install .

      - name: Generate RSS feed
        run: python -m kanpo_rss --output-dir docs --data-dir data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/issues.json
          git diff --cached --quiet || git commit -m "chore: update gazette data [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ needs.build.result == 'success' && needs.deploy.result == 'success' && '#36a64f' || '#dc3545' }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ needs.build.result == 'success' && needs.deploy.result == 'success' && ':white_check_mark:' || ':x:' }} *官報RSSフィード生成* - ${{ needs.build.result == 'success' && needs.deploy.result == 'success' && '成功' || '失敗' }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|実行ログを確認>"
                      }
                    }
                  ]
                }
              ]
            }
