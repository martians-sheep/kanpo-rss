<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>官報 RSS / kanpo-rss</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans CJK JP", sans-serif;
      line-height: 1.7;
      color: #333;
      background: #fafafa;
      padding: 2rem 1rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; margin-bottom: 2rem; }
    .feed-url {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
    }
    .feed-url label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
    .feed-url code {
      display: block;
      background: #f5f5f5;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.9rem;
      word-break: break-all;
    }
    .feed-url a { color: #0066cc; text-decoration: none; }
    .feed-url a:hover { text-decoration: underline; }
    section { margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #eee; padding-bottom: 0.25rem; }
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.25rem; }
    .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; color: #999; font-size: 0.85rem; }
    .footer a { color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>官報 RSS</h1>
    <p class="subtitle">日本国官報の新着情報をRSSフィードで配信</p>

    <div class="feed-url">
      <label>RSS フィード URL</label>
      <code><a href="feed.xml">feed.xml</a></code>
    </div>

    <section>
      <h2>配信内容</h2>
      <ul>
        <li>本紙</li>
        <li>号外</li>
        <li>政府調達</li>
        <li>特別号外</li>
      </ul>
      <p>直近90日分の官報発刊情報を号単位で配信しています。</p>
    </section>

    <section>
      <h2>更新頻度</h2>
      <p>平日 9:00 JST に自動更新（行政機関の休日を除く）</p>
    </section>

    <section>
      <h2>購読方法</h2>
      <p>上記のフィードURLをお使いのRSSリーダーに登録してください。</p>
      <p>Feedly、Inoreader、NetNewsWire、Reeder、Thunderbird などで利用可能です。</p>
    </section>

    <div class="footer">
      <p>
        ソースコード: <a href="https://github.com/martians-sheep/kanpo-rss">GitHub</a>
        / データ元: <a href="https://www.kanpo.go.jp/">官報</a>（内閣府）
        / <a href="llms.txt">llms.txt</a>
      </p>
    </div>
  </div>
</body>
</html>
